<svg width="100%" viewBox="0 0 680 500" role="img" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;">
  <title>커버드콜 3개월 뒤 4가지 시나리오</title>
  <desc>집값이 그대로, 살짝 오름, 크게 오름, 떨어짐의 네 가지 경우에 따른 최종 결과 비교</desc>
  <defs>
    <marker id="cc-arrow-outcomes" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 헤더 -->
  <text x="90" y="38" text-anchor="middle" font-size="12" fill="#5F5E5A">3개월 뒤 집값</text>
  <text x="340" y="38" text-anchor="middle" font-size="12" fill="#5F5E5A">일어나는 일</text>
  <text x="580" y="38" text-anchor="middle" font-size="12" fill="#5F5E5A">최종 결과</text>
  <line x1="40" y1="52" x2="640" y2="52" stroke="#D3D1C7" stroke-width="0.5"/>

  <!-- 시나리오 1: 그대로 (긍정) -->
  <rect x="40" y="70" width="140" height="80" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="110" y="102" text-anchor="middle" font-size="14" font-weight="500" fill="#27500A">그대로 (10억)</text>
  <text x="110" y="122" text-anchor="middle" font-size="12" fill="#3B6D11">거의 안 움직임</text>
  <line x1="180" y1="110" x2="260" y2="110" stroke="#888780" stroke-width="1" marker-end="url(#cc-arrow-outcomes)"/>
  <text x="340" y="100" text-anchor="middle" font-size="14" fill="#2C2C2A">상대방이 권리를 안 씁니다</text>
  <text x="340" y="124" text-anchor="middle" font-size="12" fill="#5F5E5A">시장에서 더 비싸게 사야 해서</text>
  <rect x="500" y="70" width="140" height="80" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="570" y="102" text-anchor="middle" font-size="14" font-weight="500" fill="#27500A">집 + 1,000만 원</text>
  <text x="570" y="122" text-anchor="middle" font-size="12" fill="#3B6D11">가장 좋은 경우</text>

  <!-- 시나리오 2: 살짝 오름 (중립) -->
  <rect x="40" y="170" width="140" height="80" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="110" y="202" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">살짝 오름</text>
  <text x="110" y="222" text-anchor="middle" font-size="12" fill="#185FA5">11.5억 정도</text>
  <line x1="180" y1="210" x2="260" y2="210" stroke="#888780" stroke-width="1" marker-end="url(#cc-arrow-outcomes)"/>
  <text x="340" y="200" text-anchor="middle" font-size="14" fill="#2C2C2A">상대방이 11억에 사갑니다</text>
  <text x="340" y="224" text-anchor="middle" font-size="12" fill="#5F5E5A">집은 넘어가고 현금 수령</text>
  <rect x="500" y="170" width="140" height="80" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="570" y="202" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">11억 + 1,000만 원</text>
  <text x="570" y="222" text-anchor="middle" font-size="12" fill="#185FA5">나쁘지 않음</text>

  <!-- 시나리오 3: 크게 오름 (아쉬움) -->
  <rect x="40" y="270" width="140" height="80" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="110" y="302" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">크게 오름</text>
  <text x="110" y="322" text-anchor="middle" font-size="12" fill="#854F0B">13억 정도</text>
  <line x1="180" y1="310" x2="260" y2="310" stroke="#888780" stroke-width="1" marker-end="url(#cc-arrow-outcomes)"/>
  <text x="340" y="300" text-anchor="middle" font-size="14" fill="#2C2C2A">상대방이 11억에 사갑니다</text>
  <text x="340" y="324" text-anchor="middle" font-size="12" fill="#854F0B">약속한 값이 싸서 무조건 행사</text>
  <rect x="500" y="270" width="140" height="80" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="570" y="302" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">11억 + 1,000만 원</text>
  <text x="570" y="322" text-anchor="middle" font-size="12" fill="#854F0B">2억 덜 번 셈, 아쉬움</text>

  <!-- 시나리오 4: 떨어짐 (손해) -->
  <rect x="40" y="370" width="140" height="80" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="110" y="402" text-anchor="middle" font-size="14" font-weight="500" fill="#712B13">떨어짐</text>
  <text x="110" y="422" text-anchor="middle" font-size="12" fill="#993C1D">8억 정도</text>
  <line x1="180" y1="410" x2="260" y2="410" stroke="#888780" stroke-width="1" marker-end="url(#cc-arrow-outcomes)"/>
  <text x="340" y="400" text-anchor="middle" font-size="14" fill="#2C2C2A">상대방이 권리를 안 씁니다</text>
  <text x="340" y="424" text-anchor="middle" font-size="12" fill="#993C1D">시장이 더 싸서 살 이유 없음</text>
  <rect x="500" y="370" width="140" height="80" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="570" y="402" text-anchor="middle" font-size="14" font-weight="500" fill="#712B13">집(8억) + 1,000만 원</text>
  <text x="570" y="422" text-anchor="middle" font-size="12" fill="#993C1D">손해, 프리미엄은 쿠션</text>
</svg>
