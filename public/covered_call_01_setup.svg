<svg width="100%" viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;">
  <title>커버드콜 거래 구조</title>
  <desc>집 주인이 매수자에게 3개월 뒤 11억에 집을 살 권리를 주고, 그 대가로 1000만원을 받는 거래 구조</desc>
  <defs>
    <marker id="cc-arrow-setup" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 왼쪽 카드: 집 주인 -->
  <rect x="40" y="50" width="220" height="200" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="150" y="78" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">내 쪽 (집 주인)</text>

  <!-- 집 아이콘 -->
  <g transform="translate(105, 100)">
    <polygon points="0,35 45,0 90,35" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linejoin="round"/>
    <rect x="8" y="35" width="74" height="55" fill="none" stroke="#0F6E56" stroke-width="1.5"/>
    <rect x="38" y="62" width="18" height="28" fill="none" stroke="#0F6E56" stroke-width="1.2"/>
    <rect x="17" y="46" width="14" height="12" fill="none" stroke="#0F6E56" stroke-width="1"/>
    <rect x="63" y="46" width="14" height="12" fill="none" stroke="#0F6E56" stroke-width="1"/>
  </g>
  <text x="150" y="222" text-anchor="middle" font-size="12" fill="#0F6E56">10억짜리 아파트 한 채</text>

  <!-- 오른쪽 카드: 매수자 -->
  <rect x="420" y="50" width="220" height="200" rx="12" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="530" y="78" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">상대방 (매수자)</text>

  <!-- 원화 심볼 -->
  <g transform="translate(500, 115)">
    <circle cx="30" cy="30" r="32" fill="none" stroke="#854F0B" stroke-width="1.5"/>
    <text x="30" y="40" text-anchor="middle" font-size="28" font-weight="500" fill="#854F0B">₩</text>
  </g>
  <text x="530" y="222" text-anchor="middle" font-size="12" fill="#854F0B">현금 1,000만 원을 들고 옴</text>

  <!-- 위쪽 화살표: 권리 전달 -->
  <line x1="260" y1="120" x2="420" y2="120" stroke="#534AB7" stroke-width="1.2" marker-end="url(#cc-arrow-setup)"/>
  <text x="340" y="108" text-anchor="middle" font-size="12" fill="#534AB7">3개월 뒤 11억에 살 권리</text>

  <!-- 아래쪽 화살표: 돈 전달 -->
  <line x1="420" y1="180" x2="260" y2="180" stroke="#993C1D" stroke-width="1.2" marker-end="url(#cc-arrow-setup)"/>
  <text x="340" y="196" text-anchor="middle" font-size="12" fill="#993C1D">지금 1,000만 원 (프리미엄)</text>
</svg>
